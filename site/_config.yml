title: "TeckMagix Docs"
description: "Study guides, lab answers and notes — auto-generated by Claude AI"
baseurl: ""
url: "https://teckmagix.github.io"

theme: null
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap

collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "page"
